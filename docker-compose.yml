services:
  frontend:
    image: nginx:alpine
    container_name: helicorp_frontend_app
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "127.254.99.100:80:80"
    depends_on:
      - backend
    restart: always
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helicorp_backend_api
    environment:
      - NODE_ENV=production
    restart: always